site_name: تدبر القرآن — مشروع فجر
docs_dir: surahs
site_dir: site

theme:
  name: material
  language: ar          # يفعّل اتجاه RTL تلقائيًا للعربية
  direction: rtl
  font: false           # نُحمّل خطوطنا العربية من extra.css بدل خطوط Material الافتراضية
  features:
    - navigation.tabs           # الأقسام الرئيسية تظهر تبويبات أعلى الموقع
    - navigation.tabs.sticky    # التبويبات تبقى ظاهرة عند التمرير
    - navigation.sections       # تجميع الأقسام في الشريط الجانبي
    - navigation.top
    - navigation.instant
    - navigation.tracking
    - search.suggest
    - search.highlight
    - toc.follow
    - toc.integrate             # عناوين الصفحة (H2/H3) تندمج في الشريط الجانبي للتنقّل المباشر
    - content.code.copy
    - content.tooltips          # معاينة الروابط عند المرور
  palette:
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: الوضع الليلي
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: الوضع النهاري

markdown_extensions:
  - toc:
      permalink: "🔗"          # رمز "نسخ رابط القسم" يظهر بجوار كل عنوان للمشاركة المباشرة
  - admonition
  - tables
  - attr_list
  - md_in_html
  - pymdownx.betterem        # تحسين تمييز *مائل* و **سميك** خصوصًا داخل الكلمات
  - pymdownx.mark            # ==تظليل==
  - pymdownx.tilde           # ~~شطب~~
  - pymdownx.caret           # ^مرتفع^
  - pymdownx.keys            # ++Ctrl+C++
  - pymdownx.details         # admonitions قابلة للطيّ
  - pymdownx.superfences     # كتل كود محسَّنة
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite    # تلوين الكود السطري

extra_css:
  - stylesheets/extra.css    # الخطوط العربية + ستايل آيات + لون التشديد

extra_javascript:
  - javascripts/reading-mode.js   # زرّ «وضع القراءة» العائم

plugins:
  - search:
      lang: ar
  - tags            # فهرس الوسوم يُدرَج في صفحة tags.md عبر العلامة <!-- material/tags -->
  - awesome-pages   # يبني القائمة الجانبية من بنية المجلدات وملفات .pages

hooks:
  - scripts/hooks/note_types.py   # يُلصق شارة نوع الملاحظة (تأمل/لغة/سؤال…) حسب موقع الصفحة
